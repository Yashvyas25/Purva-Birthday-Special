<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a1;
            --bg: #fff5f6;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: #444;
            overflow-x: hidden;
        }

        .background-bubbles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #fff5f6 0%, #ffcad4 100%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(255, 133, 161, 0.15);
            margin-bottom: 30px;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 2.8rem; margin: 10px 0; }

        .quest-instruction { font-size: 1rem; color: #777; margin-bottom: 20px; }

        /* Treasure Icons */
        .treasure-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .treasure {
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        .treasure:hover { transform: scale(1.2); }
        .treasure.found { filter: grayscale(1); opacity: 0.3; pointer-events: none; }

        /* Photo Prizes */
        .photo-prize {
            display: none;
            background: white;
            padding: 15px 15px 35px 15px;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 250px;
            margin: 20px auto;
            transform: rotate(-2deg);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(-2deg); opacity: 1; }
        }

        .photo-prize img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 3px;
        }

        .photo-caption {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            margin-top: 15px;
            color: #555;
        }

        .countdown {
            margin-top: 30px;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .confetti {
            position: fixed;
            width: 8px; height: 8px;
            top: -10px;
            animation: fall 3s linear forwards;
            z-index: 100;
        }

        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="background-bubbles"></div>

    <div class="container">
        <div class="glass-card">
            <h1>The Birthday Loading...</h1>
            <p class="quest-instruction">Find the 4 hidden memories to unlock the countdown!</p>

            <div class="treasure-grid">
                <div class="treasure" onclick="reveal(1, 'Our first adventure!')">✨</div>
                <div class="treasure" onclick="reveal(2, 'The best smile ever.')">🎁</div>
                <div class="treasure" onclick="reveal(3, 'Silly moments together.')">🍭</div>
                <div class="treasure" onclick="reveal(4, 'One year older, more beautiful.')">🎈</div>
            </div>

            <div id="prize-1" class="photo-prize">
                <img src="IMG_9268.jpg" alt="Memory 1">
                <div class="photo-caption">Our first adventure! ❤️</div>
            </div>
            <div id="prize-2" class="photo-prize">
                <img src="IMG_9631.jpg" alt="Memory 2">
                <div class="photo-caption">That perfect smile... ✨</div>
            </div>
            <div id="prize-3" class="photo-prize">
                <img src="f4e7d54b-fc48-4105-b5d4-bab697c8a54b.JPG" alt="Memory 3">
                <div class="photo-caption">Always being silly! 🤪</div>
            </div>
            <div id="prize-4" class="photo-prize">
                <img src="IMG_6771.jpg" alt="Memory 4">
                <div class="photo-caption">The best is yet to come. 💍</div>
            </div>

            <div class="countdown" id="timer">Loading time...</div>
        </div>
    </div>

    <script>
        function reveal(id, msg) {
            // Hide all current prizes
            document.querySelectorAll('.photo-prize').forEach(p => p.style.display = 'none');
            
            // Show the specific prize
            const prize = document.getElementById('prize-' + id);
            prize.style.display = 'block';
            
            // Mark emoji as found
            event.target.classList.add('found');
            
            createConfetti();
        }

        function createConfetti() {
            for(let i=0; i<15; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#ff85a1', '#ffacc5', '#ffffff'][Math.floor(Math.random()*3)];
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        // Countdown logic for May 9th
        const target = new Date("May 9, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "HAPPY BIRTHDAY!!! 🎉🎂";
                return;
            }
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('timer').innerText = `Full surprise unlocks in ${h}h ${m}m ${s}s`;
        }, 1000);
    </script>
</body>
</html>
