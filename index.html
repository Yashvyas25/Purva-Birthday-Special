<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a1;
            --secondary: #fbb1bd;
            --bg: #fff5f6;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: #444;
            overflow-x: hidden;
            text-align: center;
        }

        .background-hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(255, 133, 161, 0.15);
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 2.5rem; }

        /* The Quest Area */
        .quest-box {
            margin: 30px 0;
            padding: 20px;
            border: 2px dashed var(--primary);
            border-radius: 20px;
            background: #fff;
        }

        .clue-count {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* Floating Treasure Icons */
        .treasure {
            display: inline-block;
            font-size: 2.5rem;
            cursor: pointer;
            margin: 15px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        .treasure:hover { transform: scale(1.3) rotate(10deg); }
        .treasure.found { filter: grayscale(1); opacity: 0.5; pointer-events: none; }

        /* Pop-up Message */
        #message-box {
            height: 60px;
            margin-top: 20px;
            font-style: italic;
            color: #ff4d6d;
            font-weight: 600;
        }

        /* Countdown */
        .countdown {
            font-size: 1.2rem;
            margin-top: 20px;
            letter-spacing: 2px;
            color: #888;
        }

        .hidden { display: none; }

        /* Confetti Effect */
        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            background-color: var(--primary);
            top: -10px;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="bg"></div>

    <div class="container">
        <div class="glass-card">
            <h1 id="main-title">The Birthday Loading...</h1>
            <p>I couldn't wait until midnight to show you this. Can you find all 5 hidden surprises while we wait?</p>

            <div class="quest-box">
                <div class="clue-count">Found: <span id="count">0</span> / 5</div>
                
                <div class="treasure" onclick="reveal(this, 'You make my heart skip a beat! 💓')">🎁</div>
                <div class="treasure" onclick="reveal(this, 'I hope your birthday is as sweet as you are! 🍭')">✨</div>
                <div class="treasure" onclick="reveal(this, 'You are my favorite person in the whole world. 🌍')">⭐</div>
                <div class="treasure" onclick="reveal(this, 'Hint: Your first gift is something you once mentioned... 🤫')">🗝️</div>
                <div class="treasure" onclick="reveal(this, 'Just a few more hours until the big reveal! ⏳')">🎈</div>

                <div id="message-box">Click an icon to unlock a secret!</div>
            </div>

            <div class="countdown" id="timer">00:00:00:00 until May 9th</div>
            
            <div id="final-hint" class="hidden">
                <p style="color: var(--primary); font-weight: bold;">🎉 All secrets found! Check back at midnight for the full gallery. 🎉</p>
            </div>
        </div>
    </div>

    <script>
        let foundCount = 0;
        const total = 5;

        function reveal(element, msg) {
            if (!element.classList.contains('found')) {
                element.classList.add('found');
                foundCount++;
                document.getElementById('count').innerText = foundCount;
                document.getElementById('message-box').innerText = msg;
                createConfetti();

                if (foundCount === total) {
                    document.getElementById('final-hint').classList.remove('hidden');
                }
            }
        }

        function createConfetti() {
            for(let i=0; i<10; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#ff85a1', '#fbb1bd', '#ffacc5'][Math.floor(Math.random()*3)];
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        // Timer Logic
        const targetDate = new Date("May 9, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('timer').innerText = "IT'S TIME! 🎂";
                // You could auto-redirect her to a "Final" page here if you wanted!
                return;
            }
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('timer').innerText = `${h}h ${m}m ${s}s remaining...`;
        }, 1000);
    </script>
</body>
</html>
